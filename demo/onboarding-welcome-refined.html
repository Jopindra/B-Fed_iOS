<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Fed - Refined Welcome</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .iphone {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 54px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .iphone-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #FDFCFA 0%, #FAF7F3 50%, #F7F3EE 100%);
            border-radius: 44px;
            overflow: hidden;
            position: relative;
        }
        
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 100;
        }
        
        /* Progress Stepper */
        .progress-stepper {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding-top: 55px;
            margin-bottom: 20px;
        }
        
        .step-dot {
            height: 6px;
            border-radius: 3px;
            background: rgba(0,0,0,0.08);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .step-dot.active {
            background: #2D6A5E;
            width: 24px;
        }
        
        .step-dot:not(.active) {
            width: 6px;
        }
        
        /* Welcome Content */
        .welcome-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px 28px 40px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* Hero Bottle */
        .hero-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 36px;
            position: relative;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            animation: heroEnter 0.6s ease 0.1s forwards;
        }
        
        @keyframes heroEnter {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* Halo rings */
        .halo {
            position: absolute;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        .halo-outer {
            width: 200px;
            height: 200px;
            border: 1px solid rgba(45, 106, 94, 0.12);
            animation: haloPulse 4s ease-in-out infinite;
        }
        
        .halo-middle {
            width: 168px;
            height: 168px;
            background: rgba(45, 106, 94, 0.06);
            animation: haloPulse 4s ease-in-out infinite;
            animation-delay: -0.2s;
        }
        
        @keyframes haloPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }
        
        .halo-inner {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, rgba(45, 106, 94, 0.1) 0%, transparent 70%);
        }
        
        /* Bottle */
        .bottle-container {
            position: relative;
            z-index: 1;
            width: 100px;
            height: 136px;
        }
        
        .bottle-svg {
            width: 100%;
            height: 100%;
        }
        
        .bottle-outline {
            fill: none;
            stroke: rgba(45, 106, 94, 0.28);
            stroke-width: 2;
        }
        
        .bottle-liquid {
            fill: rgba(45, 106, 94, 0.5);
            animation: liquidWave 3s ease-in-out infinite;
        }
        
        @keyframes liquidWave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }
        
        .bottle-teat {
            fill: rgba(45, 106, 94, 0.35);
        }
        
        /* Text Content */
        .text-content {
            text-align: center;
        }
        
        .headline {
            font-size: 32px;
            font-weight: 700;
            color: #1A1A1A;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
            opacity: 0;
            transform: translateY(16px);
            animation: textEnter 0.5s ease 0.22s forwards;
        }
        
        .subtext {
            font-size: 15px;
            font-weight: 400;
            color: rgba(90, 90, 90, 0.9);
            line-height: 1.4;
            padding-top: 4px;
            opacity: 0;
            transform: translateY(12px);
            animation: textEnter 0.4s ease 0.32s forwards;
        }
        
        @keyframes textEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* CTA Button */
        .cta-button {
            margin-top: auto;
            background: linear-gradient(180deg, #2D6A5E 0%, #255951 100%);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(45, 106, 94, 0.22);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.1s ease;
            opacity: 0;
            transform: translateY(16px);
            animation: textEnter 0.45s ease 0.42s forwards;
        }
        
        .cta-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(45, 106, 94, 0.28);
        }
        
        .cta-button:active {
            transform: scale(0.97);
            filter: brightness(0.97);
        }
        
        .cta-arrow {
            font-size: 14px;
            opacity: 0;
            transform: translateX(-8px);
            animation: arrowEnter 0.3s ease 0.6s forwards;
        }
        
        @keyframes arrowEnter {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="iphone">
        <div class="iphone-inner">
            <div class="notch"></div>
            
            <div class="progress-stepper">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
                <div class="step-dot"></div>
                <div class="step-dot"></div>
            </div>
            
            <div class="welcome-content">
                <div class="hero-container">
                    <div class="halo halo-outer"></div>
                    <div class="halo halo-middle"></div>
                    <div class="halo halo-inner"></div>
                    
                    <div class="bottle-container">
                        <svg class="bottle-svg" viewBox="0 0 100 136">
                            <!-- Bottle outline -->
                            <path class="bottle-outline" d="M32 30 L32 48 Q14 60 14 65 L14 118 Q14 132 50 132 Q86 132 86 118 L86 65 Q86 60 68 48 L68 30 Q68 20 50 20 Q32 20 32 30"/>
                            <!-- Liquid fill -->
                            <path class="bottle-liquid" d="M16 85 Q16 130 50 130 Q84 130 84 85 L84 70 Q84 65 50 65 Q16 65 16 70 Z"/>
                            <!-- Teat -->
                            <ellipse class="bottle-teat" cx="50" cy="18" rx="10" ry="5"/>
                        </svg>
                    </div>
                </div>
                
                <div class="text-content">
                    <h1 class="headline">Feel confident<br>feeding your baby</h1>
                    <p class="subtext">Track feeds, spot patterns, and know<br>they're getting enough — effortlessly</p>
                </div>
                
                <button class="cta-button">
                    Get started
                    <span class="cta-arrow">→</span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
